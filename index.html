<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Times Tables Adventure!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 0;
  }

  /* Floating background shapes */
  .bg-shape {
    position: fixed;
    border-radius: 50%;
    opacity: 0.15;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
  }
  .bg-shape:nth-child(1) { width:120px;height:120px;background:#fff;top:10%;left:5%;animation-delay:0s; }
  .bg-shape:nth-child(2) { width:80px;height:80px;background:#ffd700;top:70%;left:80%;animation-delay:1s; }
  .bg-shape:nth-child(3) { width:60px;height:60px;background:#ff6b9d;top:40%;left:90%;animation-delay:2s; }
  .bg-shape:nth-child(4) { width:100px;height:100px;background:#00d4ff;top:80%;left:10%;animation-delay:3s; }
  .bg-shape:nth-child(5) { width:50px;height:50px;background:#ffb347;top:20%;left:85%;animation-delay:1.5s; }

  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }

  #app {
    background: white;
    border-radius: 30px;
    padding: 40px;
    width: 440px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    position: relative;
    z-index: 10;
    text-align: center;
  }

  /* === SCREENS === */
  .screen { display: none; }
  .screen.active { display: block; }

  /* === START SCREEN === */
  .title {
    font-size: 2.4rem;
    font-weight: 900;
    background: linear-gradient(135deg, #667eea, #f64f59);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .subtitle { color: #888; font-size: 1rem; margin-bottom: 28px; }

  .table-select-label {
    font-weight: 700;
    color: #555;
    margin-bottom: 12px;
    font-size: 1rem;
  }
  .table-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }
  .table-btn {
    padding: 10px 0;
    border: 3px solid #e0e0e0;
    border-radius: 12px;
    background: white;
    font-family: inherit;
    font-weight: 700;
    font-size: 1.1rem;
    color: #777;
    cursor: pointer;
    transition: all 0.2s;
  }
  .table-btn:hover { border-color: #667eea; color: #667eea; transform: scale(1.05); }
  .table-btn.selected {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-color: transparent;
    color: white;
    transform: scale(1.08);
  }

  .start-btn {
    background: linear-gradient(135deg, #f64f59, #c471ed);
    color: white;
    border: none;
    border-radius: 18px;
    padding: 16px 48px;
    font-family: inherit;
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(246,79,89,0.4);
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(246,79,89,0.5); }
  .start-btn:active { transform: translateY(0); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* === GAME SCREEN === */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .score-box, .streak-box {
    background: #f7f0ff;
    border-radius: 14px;
    padding: 8px 16px;
    text-align: center;
  }
  .score-box .label, .streak-box .label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
  }
  .score-box .value { font-size: 1.4rem; font-weight: 900; color: #764ba2; }
  .streak-box .value { font-size: 1.4rem; font-weight: 900; color: #f64f59; }

  .timer-ring {
    position: relative;
    width: 64px;
    height: 64px;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
  }
  .timer-bg { stroke: #f0e6ff; }
  .timer-fg {
    stroke: #667eea;
    stroke-dasharray: 163;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.1s linear, stroke 0.3s;
  }
  .timer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: 1.1rem;
    font-weight: 900;
    color: #667eea;
  }

  .progress-bar-wrap {
    background: #f0e6ff;
    border-radius: 10px;
    height: 10px;
    margin-bottom: 22px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #667eea, #f64f59);
    transition: width 0.4s ease;
  }

  .question-label {
    font-size: 0.8rem;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .question-box {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 24px;
    padding: 28px 20px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .question-box::before {
    content: '';
    position: absolute;
    top: -30px;
    right: -30px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }
  .question-text {
    font-size: 3rem;
    font-weight: 900;
    color: white;
    letter-spacing: 2px;
    text-shadow: 0 3px 10px rgba(0,0,0,0.2);
  }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .answer-btn {
    padding: 18px 10px;
    border: 3px solid #e8e0f5;
    border-radius: 18px;
    background: white;
    font-family: inherit;
    font-size: 1.5rem;
    font-weight: 900;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .answer-btn:hover:not(:disabled) {
    border-color: #667eea;
    color: #667eea;
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(102,126,234,0.25);
  }
  .answer-btn:active:not(:disabled) { transform: translateY(0); }
  .answer-btn.correct {
    background: linear-gradient(135deg, #56ab2f, #a8e063);
    border-color: transparent;
    color: white;
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(86,171,47,0.4);
  }
  .answer-btn.wrong {
    background: linear-gradient(135deg, #f64f59, #c471ed);
    border-color: transparent;
    color: white;
    animation: shake 0.4s;
  }
  .answer-btn.reveal {
    background: linear-gradient(135deg, #56ab2f, #a8e063);
    border-color: transparent;
    color: white;
    opacity: 0.7;
  }
  .answer-btn:disabled { cursor: default; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .feedback {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 16px;
    border-radius: 12px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .feedback.show { opacity: 1; }
  .feedback.good { background: #e8f8e0; color: #3a8c1b; }
  .feedback.bad  { background: #fff0f0; color: #c0392b; }

  /* === RESULT SCREEN === */
  .result-emoji { font-size: 4rem; margin-bottom: 10px; }
  .result-title {
    font-size: 2rem;
    font-weight: 900;
    color: #764ba2;
    margin-bottom: 6px;
  }
  .result-subtitle { color: #999; margin-bottom: 24px; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
  }
  .stat-card {
    background: #f7f0ff;
    border-radius: 16px;
    padding: 14px 22px;
    text-align: center;
  }
  .stat-card .stat-val {
    font-size: 1.8rem;
    font-weight: 900;
    color: #667eea;
  }
  .stat-card .stat-lbl { font-size: 0.75rem; color: #aaa; font-weight: 700; text-transform: uppercase; }

  .stars-row { font-size: 2rem; margin-bottom: 20px; letter-spacing: 4px; }

  .result-btns { display: flex; gap: 12px; justify-content: center; }
  .replay-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 14px 28px;
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 18px rgba(102,126,234,0.4);
  }
  .replay-btn:hover { transform: translateY(-2px); }
  .menu-btn {
    background: #f0e6ff;
    color: #764ba2;
    border: none;
    border-radius: 16px;
    padding: 14px 28px;
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
  }
  .menu-btn:hover { background: #e0d0ff; }

  /* Confetti canvas */
  #confetti { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100; }

  /* Bounce animation for question */
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: popIn 0.35s ease forwards; }
</style>
</head>
<body>
<!-- Background decorations -->
<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>

<canvas id="confetti"></canvas>

<div id="app">

  <!-- START SCREEN -->
  <div id="startScreen" class="screen active">
    <div class="title">Times Tables<br>Adventure! 🚀</div>
    <div class="subtitle">Pick your tables and go!</div>

    <div class="table-select-label">Choose your tables (pick 1 or more):</div>
    <div class="table-grid" id="tableGrid">
      <button class="table-btn" onclick="toggleTable(2, this)">&times;2</button>
      <button class="table-btn" onclick="toggleTable(3, this)">&times;3</button>
      <button class="table-btn" onclick="toggleTable(4, this)">&times;4</button>
      <button class="table-btn" onclick="toggleTable(5, this)">&times;5</button>
      <button class="table-btn" onclick="toggleTable(6, this)">&times;6</button>
      <button class="table-btn" onclick="toggleTable(7, this)">&times;7</button>
      <button class="table-btn" onclick="toggleTable(8, this)">&times;8</button>
      <button class="table-btn" onclick="toggleTable(9, this)">&times;9</button>
      <button class="table-btn" onclick="toggleTable(10, this)">&times;10</button>
      <button class="table-btn" onclick="toggleTable(11, this)">&times;11</button>
      <button class="table-btn" onclick="toggleTable(12, this)">&times;12</button>
    </div>

    <button class="start-btn" id="startBtn" onclick="startGame()" disabled>Let's Go! ⚡</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen">
    <div class="hud">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="scoreDisplay">0</div>
      </div>
      <div class="timer-ring">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle class="timer-bg" cx="32" cy="32" r="26"/>
          <circle class="timer-fg" id="timerCircle" cx="32" cy="32" r="26"/>
        </svg>
        <div class="timer-text" id="timerText">10</div>
      </div>
      <div class="streak-box">
        <div class="label">Streak 🔥</div>
        <div class="value" id="streakDisplay">0</div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>

    <div class="question-label" id="questionLabel">Question 1 of 10</div>
    <div class="question-box">
      <div class="question-text" id="questionText">3 × 4 = ?</div>
    </div>

    <div class="answers-grid" id="answersGrid"></div>

    <div class="feedback" id="feedback"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen" class="screen">
    <div class="result-emoji" id="resultEmoji">🏆</div>
    <div class="result-title" id="resultTitle">Amazing!</div>
    <div class="result-subtitle" id="resultSubtitle">You did great!</div>
    <div class="stars-row" id="starsRow">⭐⭐⭐</div>
    <div class="result-stats">
      <div class="stat-card">
        <div class="stat-val" id="finalScore">0</div>
        <div class="stat-lbl">Score</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="finalCorrect">0/10</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="finalStreak">0</div>
        <div class="stat-lbl">Best Streak</div>
      </div>
    </div>
    <div class="result-btns">
      <button class="replay-btn" onclick="startGame()">Play Again! 🎮</button>
      <button class="menu-btn" onclick="showStart()">Menu 🏠</button>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const TOTAL_QUESTIONS = 10;
const TIME_PER_Q      = 10; // seconds
const TIMER_CIRC      = 2 * Math.PI * 26; // circumference

// ── STATE ────────────────────────────────────────────────────────────────────
let selectedTables = new Set();
let questions = [];
let currentQ   = 0;
let score      = 0;
let streak     = 0;
let bestStreak = 0;
let correct    = 0;
let timerVal   = TIME_PER_Q;
let timerInterval = null;
let answered   = false;


function toggleTable(n, btn) {
  if (selectedTables.has(n)) {
    selectedTables.delete(n);
    btn.classList.remove('selected');
  } else {
    selectedTables.add(n);
    btn.classList.add('selected');
  }
  document.getElementById('startBtn').disabled = selectedTables.size === 0;
}

// ── SCREEN HELPERS ───────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showStart() {
  stopTimer();
  showScreen('startScreen');
}

// ── QUESTION GENERATION ──────────────────────────────────────────────────────
function buildQuestions() {
  const pool = [...selectedTables];
  const qs = [];
  const seen = new Set();
  let attempts = 0;
  while (qs.length < TOTAL_QUESTIONS && attempts < 300) {
    attempts++;
    const a = pool[Math.floor(Math.random() * pool.length)];
    const b = Math.floor(Math.random() * 12) + 1;
    const key = `${a}x${b}`;
    if (seen.has(key)) continue;
    seen.add(key);
    const answer = a * b;
    // Generate 3 wrong answers (close but distinct)
    const wrongs = new Set();
    while (wrongs.size < 3) {
      const offset = (Math.floor(Math.random() * 5) + 1) * (Math.random() < 0.5 ? 1 : -1);
      const w = answer + offset;
      if (w > 0 && w !== answer && !wrongs.has(w)) wrongs.add(w);
    }
    const choices = shuffle([answer, ...wrongs]);
    qs.push({ text: `${a} × ${b} = ?`, answer, choices });
  }
  return qs;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── GAME FLOW ─────────────────────────────────────────────────────────────────
function startGame() {
  questions  = buildQuestions();
  currentQ   = 0;
  score      = 0;
  streak     = 0;
  bestStreak = 0;
  correct    = 0;
  showScreen('gameScreen');
  loadQuestion();
}

function loadQuestion() {
  stopTimer();
  answered = false;
  const q = questions[currentQ];

  // Update HUD
  document.getElementById('scoreDisplay').textContent  = score;
  document.getElementById('streakDisplay').textContent = streak;
  document.getElementById('questionLabel').textContent =
    `Question ${currentQ + 1} of ${TOTAL_QUESTIONS}`;
  document.getElementById('progressBar').style.width =
    `${(currentQ / TOTAL_QUESTIONS) * 100}%`;

  // Question text with pop animation
  const qText = document.getElementById('questionText');
  qText.classList.remove('pop');
  void qText.offsetWidth; // reflow
  qText.textContent = q.text;
  qText.classList.add('pop');

  // Answer buttons
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  q.choices.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = val;
    btn.addEventListener('click', () => selectAnswer(val, btn, q.answer));
    grid.appendChild(btn);
  });

  // Clear feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  // Start timer
  timerVal = TIME_PER_Q;
  updateTimerUI();
  timerInterval = setInterval(tickTimer, 100);
}

function tickTimer() {
  timerVal -= 0.1;
  if (timerVal <= 0) {
    timerVal = 0;
    updateTimerUI();
    timeUp();
  } else {
    updateTimerUI();
  }
}

function updateTimerUI() {
  const pct = timerVal / TIME_PER_Q;
  const offset = TIMER_CIRC * (1 - pct);
  const circle = document.getElementById('timerCircle');
  const text   = document.getElementById('timerText');
  circle.style.strokeDashoffset = offset;
  text.textContent = Math.ceil(timerVal);

  // Color shift: blue → orange → red
  if (pct > 0.5)      circle.style.stroke = '#667eea';
  else if (pct > 0.25) circle.style.stroke = '#ffb347';
  else                 circle.style.stroke = '#f64f59';
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function timeUp() {
  stopTimer();
  if (answered) return;
  answered = true;
  streak = 0;
  document.getElementById('streakDisplay').textContent = streak;

  // Reveal correct answer
  const grid = document.getElementById('answersGrid');
  const btns = grid.querySelectorAll('.answer-btn');
  btns.forEach(b => {
    b.disabled = true;
    if (+b.textContent === questions[currentQ].answer) b.classList.add('reveal');
  });

  showFeedback(false, '⏰ Time\'s up! The answer was ' + questions[currentQ].answer);
  setTimeout(nextQuestion, 1800);
}

function selectAnswer(val, btn, answer) {
  if (answered) return;
  answered = true;
  stopTimer();

  const grid = document.getElementById('answersGrid');
  grid.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

  const isCorrect = val === answer;
  if (isCorrect) {
    btn.classList.add('correct');
    const bonus = Math.ceil(timerVal);
    score += 10 + bonus;
    streak++;
    correct++;
    if (streak > bestStreak) bestStreak = streak;
    document.getElementById('scoreDisplay').textContent  = score;
    document.getElementById('streakDisplay').textContent = streak;
    const msgs = ['🌟 Brilliant!', '🎉 Correct!', '🔥 Amazing!', '✨ You rock!', '💥 Perfect!'];
    showFeedback(true, msgs[Math.floor(Math.random() * msgs.length)] + ` +${10 + bonus} pts`);
    if (streak >= 3) launchConfetti();
  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.getElementById('streakDisplay').textContent = streak;
    // Show correct
    grid.querySelectorAll('.answer-btn').forEach(b => {
      if (+b.textContent === answer) b.classList.add('reveal');
    });
    showFeedback(false, `😬 Not quite! The answer is ${answer}`);
  }

  setTimeout(nextQuestion, 1600);
}

function showFeedback(good, msg) {
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = 'feedback show ' + (good ? 'good' : 'bad');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= TOTAL_QUESTIONS) {
    showResults();
  } else {
    loadQuestion();
  }
}

// ── RESULTS ──────────────────────────────────────────────────────────────────
function showResults() {
  stopTimer();
  document.getElementById('progressBar').style.width = '100%';

  const pct = correct / TOTAL_QUESTIONS;
  let emoji, title, subtitle, stars;
  if (pct === 1)        { emoji='🏆'; title='PERFECT!';       subtitle='You got every single one!';    stars='⭐⭐⭐'; }
  else if (pct >= 0.8)  { emoji='🌟'; title='Superstar!';     subtitle='Almost perfect — wow!';         stars='⭐⭐⭐'; }
  else if (pct >= 0.6)  { emoji='😊'; title='Great Job!';     subtitle='Keep practising, you\'re close!'; stars='⭐⭐'; }
  else if (pct >= 0.4)  { emoji='💪'; title='Good Effort!';   subtitle='Practice makes perfect!';       stars='⭐'; }
  else                  { emoji='🌈'; title='Keep Going!';    subtitle='You\'ll get better every time!'; stars='⭐'; }

  document.getElementById('resultEmoji').textContent    = emoji;
  document.getElementById('resultTitle').textContent    = title;
  document.getElementById('resultSubtitle').textContent = subtitle;
  document.getElementById('starsRow').textContent       = stars;
  document.getElementById('finalScore').textContent     = score;
  document.getElementById('finalCorrect').textContent   = `${correct}/${TOTAL_QUESTIONS}`;
  document.getElementById('finalStreak').textContent    = bestStreak;

  showScreen('resultScreen');
  if (pct >= 0.8) launchConfetti();
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('confetti');
  const ctx    = canvas.getContext('2d');
  let particles = [];
  let animId = null;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  window.launchConfetti = function() {
    if (animId) cancelAnimationFrame(animId);
    const colors = ['#667eea','#f64f59','#ffd700','#56ab2f','#ff6b9d','#00d4ff','#ffb347'];
    particles = [];
    for (let i = 0; i < 100; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: -10,
        r: Math.random() * 8 + 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        vy: Math.random() * 3 + 2,
        vx: (Math.random() - 0.5) * 3,
        rot: Math.random() * 360,
        rotV: (Math.random() - 0.5) * 6,
        shape: Math.random() < 0.5 ? 'circle' : 'rect',
        alpha: 1
      });
    }
    tick();
  };

  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.alpha > 0.05);
    particles.forEach(p => {
      p.x   += p.vx;
      p.y   += p.vy;
      p.rot += p.rotV;
      p.vy  += 0.07; // gravity
      if (p.y > canvas.height * 0.7) p.alpha -= 0.025;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      }
      ctx.restore();
    });
    if (particles.length > 0) {
      animId = requestAnimationFrame(tick);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
})();
</script>
