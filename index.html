<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Games</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .bg-shape {
    position: fixed;
    border-radius: 50%;
    opacity: 0.15;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
  }
  .bg-shape:nth-child(1) { width:120px;height:120px;background:#fff;top:10%;left:5%;animation-delay:0s; }
  .bg-shape:nth-child(2) { width:80px;height:80px;background:#ffd700;top:70%;left:80%;animation-delay:1s; }
  .bg-shape:nth-child(3) { width:60px;height:60px;background:#ff6b9d;top:40%;left:90%;animation-delay:2s; }
  .bg-shape:nth-child(4) { width:100px;height:100px;background:#00d4ff;top:80%;left:10%;animation-delay:3s; }

  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }

  .hub {
    background: white;
    border-radius: 30px;
    padding: 48px 40px;
    width: 480px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
    position: relative;
    z-index: 10;
  }

  .title {
    font-size: 2.4rem;
    font-weight: 900;
    background: linear-gradient(135deg, #667eea, #f64f59);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .subtitle {
    color: #aaa;
    font-size: 1rem;
    margin-bottom: 36px;
  }

  .games-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .game-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: #f7f0ff;
    border-radius: 18px;
    padding: 18px 22px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    text-align: left;
  }
  .game-card:hover {
    background: #ede3ff;
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(102,126,234,0.2);
  }

  .game-icon {
    font-size: 2rem;
    flex-shrink: 0;
  }

  .game-info .game-name {
    font-size: 1.1rem;
    font-weight: 900;
    color: #764ba2;
  }

  .game-info .game-desc {
    font-size: 0.85rem;
    color: #aaa;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>

<div class="hub">
  <div class="title">Math Games</div>
  <div class="subtitle">Pick a game and play!</div>

  <div class="games-list">
    <a class="game-card" href="multiplication 1.html">
      <div class="game-icon">✖️</div>
      <div class="game-info">
        <div class="game-name">Times Tables Adventure</div>
        <div class="game-desc">Practice multiplication tables with a timer</div>
      </div>
    </a>
    <a class="game-card" href="multiplication-rpg.html">
      <div class="game-icon">🐀</div>
      <div class="game-info">
        <div class="game-name">Rat Hero — Pizza Quest!</div>
        <div class="game-desc">RPG battle game — answer maths to fight 10 snake dungeons!</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
